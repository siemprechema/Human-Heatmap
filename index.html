<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thermography Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-color: #000000;
            --panel-bg: rgba(5, 10, 42, 0.9);
            --text-main: #ffffff;
            --text-muted: #8ba4e8;
            --accent-red: #ff3333;
            --accent-blue: #3b82f6;
            --border-color: rgba(139, 164, 232, 0.4);
            --font-mono: 'VT323', monospace;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-mono);
            font-size: 16px; 
            width: 100vw; height: 100vh;
            overflow: hidden; 
            overscroll-behavior: none; 
        }

        #canvas-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            filter: blur(14px) contrast(1.3);
        }

        #thermo-canvas {
            width: 100%; height: 100%;
            touch-action: none; 
            cursor: grab;
        }
        #thermo-canvas:active { cursor: grabbing; }

        .panel {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color); 
            backdrop-filter: blur(8px);
            padding: 16px; 
            z-index: 10;
            border-radius: 4px;
            box-shadow: 4px 4px 15px rgba(0,0,0,0.8); 
            transition: all 0.3s ease;
        }

        .control-panel {
            width: 190px; /* Ampliado para acomodar la nueva fuente */
            display: flex; flex-direction: column; 
        }
        
        #panel-content {
            max-height: 80vh; 
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
        }

        #panel-content::-webkit-scrollbar { width: 4px; }
        #panel-content::-webkit-scrollbar-track { background: transparent; }
        #panel-content::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px dashed var(--border-color); 
            padding-bottom: 10px; 
            margin-bottom: 10px; 
        }
        
        /* Aumentos de 2pts aprox (+0.15rem) en la UI */
        .header h1 { font-size: 0.95rem; margin: 0; letter-spacing: 0.5px; color: var(--text-main); font-weight: bold;}
        .status-container { display: flex; align-items: center; gap: 8px;}
        .status { color: var(--accent-red); font-size: 0.75rem; display: flex; align-items: center; gap: 4px; animation: pulse 1.5s infinite; font-weight: bold;}
        .status::before { content: ''; width: 6px; height: 6px; background-color: var(--accent-red); border-radius: 50%; box-shadow: 0 0 6px var(--accent-red); }
        
        .collapse-btn {
            background: transparent; border: 1px solid var(--text-muted); color: var(--text-main);
            font-family: var(--font-mono); font-size: 0.9rem; cursor: pointer;
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .slider-group { display: flex; flex-direction: column; gap: 12px; padding-bottom: 2px; }
        .slider-row { display: flex; flex-direction: column; gap: 4px; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: var(--text-muted); font-weight: bold; }
        
        .header-left { display: flex; align-items: center; gap: 6px; }
        
        .info-btn {
            background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);
            border-radius: 50%; width: 14px; height: 14px; font-size: 9px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); padding: 0; transition: all 0.2s;
        }
        .info-btn:hover, .info-btn.active { background: var(--text-main); color: var(--panel-bg); border-color: var(--text-main); }

        .info-text {
            display: none; font-size: 0.65rem; color: var(--text-main); background: #020516;
            padding: 8px; border-left: 2px solid var(--text-muted); line-height: 1.3; 
            margin-top: 4px; margin-bottom: 2px; border-radius: 2px;
        }
        .info-text.show { display: block; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 14px; width: 14px; 
            background: var(--text-main); border-radius: 50%; cursor: pointer; margin-top: -5px; 
        }
        input[type=range]::-webkit-slider-runnable-track { 
            width: 100%; height: 4px; cursor: pointer; background: var(--border-color); border-radius: 2px;
        }
        
        #s-size::-webkit-slider-runnable-track { background: linear-gradient(90deg, #94a3b8, #f8fafc); } 
        #s-blood::-webkit-slider-runnable-track { background: #ff3333; } 
        #s-muscle::-webkit-slider-runnable-track { background: #ff9900; } 
        #s-inflammation::-webkit-slider-runnable-track { background: #ffffff; } 
        #s-ambient::-webkit-slider-runnable-track { background: linear-gradient(90deg, #33ccff, #ff3333); } 
        #s-humidity::-webkit-slider-runnable-track { background: #00ffff; } 
        #s-sweat::-webkit-slider-runnable-track { background: #3366ff; } 
        #s-age::-webkit-slider-runnable-track { background: #999999; } 
        #s-fat::-webkit-slider-runnable-track { background: #ffff00; } 
        #s-disease::-webkit-slider-runnable-track { background: #cc33ff; } 

        .export-section { margin-top: 15px; border-top: 1px dashed var(--border-color); padding-top: 10px; }
        .export-title { font-size: 0.75rem; color: var(--text-main); text-align: center; margin-bottom: 6px; letter-spacing: 1px;}
        .actions-row { display: flex; gap: 4px; justify-content: space-between; margin-bottom: 12px;}
        
        .btn-action {
            flex: 1; background-color: var(--bg-color); border: 1px solid var(--text-muted);
            color: var(--text-main); font-family: var(--font-mono); font-size: 0.7rem;
            padding: 6px 0; border-radius: 2px; cursor: pointer; transition: all 0.2s;
        }
        .btn-action:hover { background-color: var(--text-main); color: var(--bg-color); }
        .btn-action.recording { background-color: var(--accent-red); color: white; border-color: var(--accent-red); animation: pulse 1s infinite alternate; }

        @media (max-width: 768px) {
            .panel {
                top: 15px;
                left: 15px;
                transform: none;
                padding: 12px;
                width: auto;
            }
            .control-panel { width: 175px; } /* Ajustado para móvil */
            #panel-content { max-height: 60vh; }
            .header h1 { font-size: 0.85rem; }
        }

    </style>
</head>
<body>

    <div id="canvas-wrapper">
        <canvas id="thermo-canvas"></canvas>
    </div>

    <div class="panel" id="main-panel">
        <div class="control-panel">
            <div class="header">
                <h1>THERMO STUDIO</h1>
                <div class="status-container">
                    <div class="status">LIVE</div>
                    <button class="collapse-btn" id="btn-collapse" title="Toggle Panel">-</button>
                </div>
            </div>

            <div id="panel-content">
                <div class="slider-group">
                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left">
                                <span>PART_SIZE</span>
                            </div>
                            <span id="v-size">100%</span>
                        </div>
                        <input type="range" id="s-size" min="10" max="300" value="100">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>BLOOD_FLOW</span></div>
                            <span id="v-blood">50%</span>
                        </div>
                        <input type="range" id="s-blood" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>MUSCLE_ACT</span></div>
                            <span id="v-muscle">50%</span>
                        </div>
                        <input type="range" id="s-muscle" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>INFLAMMATION</span></div>
                            <span id="v-inflammation">50%</span>
                        </div>
                        <input type="range" id="s-inflammation" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>AMBIENT_TMP</span></div>
                            <span id="v-ambient">50%</span>
                        </div>
                        <input type="range" id="s-ambient" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>HUMIDITY</span></div>
                            <span id="v-humidity">50%</span>
                        </div>
                        <input type="range" id="s-humidity" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>SWEATING</span></div>
                            <span id="v-sweat">50%</span>
                        </div>
                        <input type="range" id="s-sweat" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>AGE</span></div>
                            <span id="v-age">50 YRS</span>
                        </div>
                        <input type="range" id="s-age" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>BODY_FAT_%</span></div>
                            <span id="v-fat">50%</span>
                        </div>
                        <input type="range" id="s-fat" min="0" max="100" value="50">
                    </div>

                    <div class="slider-row">
                        <div class="slider-header">
                            <div class="header-left"><span>DISEASES</span></div>
                            <span id="v-disease">50%</span>
                        </div>
                        <input type="range" id="s-disease" min="0" max="100" value="50">
                    </div>
                </div>

                <div class="export-section">
                    <div class="export-title">[ EXPORT ]</div>
                    <div class="actions-row">
                        <button class="btn-action" onclick="exportMedia(1920, 1080, 'png')">16:9</button>
                        <button class="btn-action" onclick="exportMedia(1080, 1920, 'png')">9:16</button>
                        <button class="btn-action" onclick="exportMedia(1080, 1440, 'png')">3:4</button>
                    </div>
                    
                    <div class="export-title">[ RECORD ]</div>
                    <div class="actions-row">
                        <button class="btn-action" id="btn-rec-169" onclick="toggleRecord(1920, 1080, this)">16:9</button>
                        <button class="btn-action" id="btn-rec-916" onclick="toggleRecord(1080, 1920, this)">9:16</button>
                        <button class="btn-action" id="btn-rec-34" onclick="toggleRecord(1080, 1440, this)">3:4</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('btn-collapse').addEventListener('click', function() {
            const content = document.getElementById('panel-content');
            if (content.style.display === 'none') {
                content.style.display = 'block';
                this.textContent = '-';
            } else {
                content.style.display = 'none';
                this.textContent = '+';
            }
        });

        function toggleInfo(id, btnElement) {
            const infoDiv = document.getElementById(id);
            document.querySelectorAll('.info-text').forEach(el => {
                if (el.id !== id && el.classList.contains('show')) {
                    el.classList.remove('show');
                    el.previousElementSibling.querySelector('.info-btn').classList.remove('active');
                }
            });
            infoDiv.classList.toggle('show');
            btnElement.classList.toggle('active');
        }

        const sliders = {
            size: document.getElementById('s-size'),
            blood: document.getElementById('s-blood'),
            muscle: document.getElementById('s-muscle'),
            inflammation: document.getElementById('s-inflammation'),
            ambient: document.getElementById('s-ambient'),
            humidity: document.getElementById('s-humidity'),
            sweat: document.getElementById('s-sweat'),
            age: document.getElementById('s-age'),
            fat: document.getElementById('s-fat'),
            disease: document.getElementById('s-disease')
        };

        const canvas = document.getElementById('thermo-canvas');
        const ctx = canvas.getContext('2d');
        
        let dpr = Math.min(window.devicePixelRatio || 1, 2);
        let currentZoom = 4.5; 
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;

        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            initAbstractFluid(); 
        }
        window.addEventListener('resize', resize);
        
        window.addEventListener('wheel', (e) => {
            if(!e.target.closest('.panel')) {
                e.preventDefault();
                if (e.ctrlKey || e.metaKey || e.shiftKey) {
                    currentZoom += e.deltaY * -0.01; 
                    currentZoom = Math.max(0.4, Math.min(currentZoom, 8));
                } else {
                    offsetX -= e.deltaX * 2;
                    offsetY -= e.deltaY * 2;
                }
            }
        }, { passive: false });

        window.addEventListener('mousedown', (e) => {
            if(!e.target.closest('.panel')) isDragging = true;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => isDragging = false);

        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2, vx: 0, vy: 0 };
        let lastMouse = { x: mouse.x, y: mouse.y };

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                offsetX += e.movementX * 1.5;
                offsetY += e.movementY * 1.5;
            }
            let rawX = e.clientX * dpr;
            let rawY = e.clientY * dpr;
            mouse.x = (rawX - canvas.width/2) / currentZoom - offsetX + canvas.width/2;
            mouse.y = (rawY - canvas.height/2) / currentZoom - offsetY + canvas.height/2;
            mouse.vx = mouse.x - lastMouse.x;
            mouse.vy = mouse.y - lastMouse.y;
            lastMouse.x = mouse.x;
            lastMouse.y = mouse.y;
        });

        let initialPinchDist = null;
        let lastTouch = null;

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                let rawX = e.touches[0].clientX * dpr;
                let rawY = e.touches[0].clientY * dpr;
                lastMouse.x = (rawX - canvas.width/2) / currentZoom - offsetX + canvas.width/2;
                lastMouse.y = (rawY - canvas.height/2) / currentZoom - offsetY + canvas.height/2;
                mouse.x = lastMouse.x;
                mouse.y = lastMouse.y;
            } else if (e.touches.length === 2) {
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDist = Math.hypot(dx, dy);
                lastTouch = null; 
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (e.touches.length === 1 && lastTouch) {
                let movementX = e.touches[0].clientX - lastTouch.x;
                let movementY = e.touches[0].clientY - lastTouch.y;
                offsetX += movementX * 1.5;
                offsetY += movementY * 1.5;
                lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };

                let rawX = e.touches[0].clientX * dpr;
                let rawY = e.touches[0].clientY * dpr;
                mouse.x = (rawX - canvas.width/2) / currentZoom - offsetX + canvas.width/2;
                mouse.y = (rawY - canvas.height/2) / currentZoom - offsetY + canvas.height/2;
                mouse.vx = mouse.x - lastMouse.x;
                mouse.vy = mouse.y - lastMouse.y;
                lastMouse.x = mouse.x;
                lastMouse.y = mouse.y;
            } else if (e.touches.length === 2) {
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                let dist = Math.hypot(dx, dy);
                
                if (initialPinchDist) {
                    let zoomDelta = (dist - initialPinchDist) * 0.015; 
                    currentZoom += zoomDelta;
                    currentZoom = Math.max(0.4, Math.min(currentZoom, 8));
                }
                initialPinchDist = dist;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDist = null;
            if (e.touches.length === 0) lastTouch = null;
        });

        const brushCache = [];
        const CACHE_STEPS = 100;
        
        function getTempColor(t, alpha) {
            let normT = Math.max(0, Math.min(1.0, t / 1.2)); 
            const stops = [
                { v: 0.00, c: [0, 0, 10] },       
                { v: 0.15, c: [0, 0, 150] },      
                { v: 0.30, c: [0, 100, 255] },    
                { v: 0.45, c: [0, 255, 255] },    
                { v: 0.60, c: [0, 255, 50] },     
                { v: 0.75, c: [255, 255, 0] },    
                { v: 0.85, c: [255, 100, 0] },    
                { v: 0.95, c: [255, 0, 0] },      
                { v: 1.00, c: [255, 255, 255] }   
            ];
            
            let lower = stops[0];
            let upper = stops[stops.length - 1];
            for (let i = 0; i < stops.length - 1; i++) {
                if (normT >= stops[i].v && normT <= stops[i+1].v) {
                    lower = stops[i];
                    upper = stops[i+1];
                    break;
                }
            }
            
            let range = upper.v - lower.v;
            let p = range === 0 ? 0 : (normT - lower.v) / range;
            let r = Math.floor(lower.c[0] + (upper.c[0] - lower.c[0]) * p);
            let g = Math.floor(lower.c[1] + (upper.c[1] - lower.c[1]) * p);
            let b = Math.floor(lower.c[2] + (upper.c[2] - lower.c[2]) * p);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function initBrushes() {
            for (let i = 0; i <= CACHE_STEPS; i++) {
                let temp = (i / CACHE_STEPS) * 1.2; 
                let c = document.createElement('canvas');
                let size = 256; 
                c.width = size; c.height = size;
                let cCtx = c.getContext('2d');
                
                let grad = cCtx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
                grad.addColorStop(0, getTempColor(temp, 1.0)); 
                grad.addColorStop(0.3, getTempColor(temp - 0.1, 0.8));
                grad.addColorStop(0.6, getTempColor(temp - 0.25, 0.35));
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                cCtx.fillStyle = grad;
                cCtx.fillRect(0, 0, size, size);
                brushCache.push(c);
            }
        }
        initBrushes();

        const particles = [];
        class AbstractThermoNode {
            constructor(bx, by, baseTemp, radius, isPeripheral, isAdipose) {
                this.baseX = bx;
                this.baseY = by;
                this.x = this.baseX;
                this.y = this.baseY;
                this.vx = 0;
                this.vy = 0;
                
                this.baseTemp = baseTemp;
                this.baseRadius = radius; 
                this.isInflammation = Math.random() > 0.96; 
                this.isPeripheral = isPeripheral; 
                this.isAdipose = isAdipose; 
                
                this.angle = Math.random() * Math.PI * 2;
                this.orbitDist = (Math.random() * 150 + 50) * dpr; 
                this.orbitSpeed = (Math.random() - 0.5) * 0.02;
            }

            update(sys) {
                this.angle += this.orbitSpeed * (1 + sys.muscle * 3);
                let targetX = this.baseX + Math.cos(this.angle) * this.orbitDist;
                let targetY = this.baseY + Math.sin(this.angle) * this.orbitDist;

                if(sys.disease > 0.5 && Math.random() < 0.05) {
                    targetX += (Math.random() - 0.5) * 200 * dpr * sys.disease;
                    targetY += (Math.random() - 0.5) * 200 * dpr * sys.disease;
                }

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                let interactionRadius = 400 * dpr; 
                if (dist < interactionRadius && !isDragging) {
                    let force = (interactionRadius - dist) / interactionRadius;
                    this.vx += mouse.vx * force * 0.45;
                    this.vy += mouse.vy * force * 0.45;
                }

                let springTension = 0.015; 
                let springForceX = (targetX - this.x) * springTension;
                let springForceY = (targetY - this.y) * springTension;
                
                this.vx += springForceX;
                this.vy += springForceY;

                this.vx *= 0.86; 
                this.vy *= 0.86;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw(sys, ctx) {
                let ageFactor = this.isPeripheral ? (1 - sys.age * 0.4) : 1;
                let currentRadius = this.baseRadius * (1 - (sys.fat * 0.15)) * ageFactor * sys.size;
                if(currentRadius <= 0) return;

                let nodeTemp = this.baseTemp + sys.globalTempOffset;
                if (this.isInflammation) nodeTemp += sys.inflammation * 0.6;
                nodeTemp += sys.muscle * 0.3;
                if (this.isAdipose) nodeTemp -= sys.fat * 0.35;
                if (this.isPeripheral) nodeTemp -= sys.age * 0.5; 

                nodeTemp = Math.max(0, Math.min(1.2, nodeTemp));

                let cacheIndex = Math.floor((nodeTemp / 1.2) * CACHE_STEPS);
                cacheIndex = Math.max(0, Math.min(CACHE_STEPS, cacheIndex));
                let brush = brushCache[cacheIndex];

                ctx.drawImage(brush, this.x - currentRadius, this.y - currentRadius, currentRadius * 2, currentRadius * 2);
            }
        }

        function initAbstractFluid() {
            particles.length = 0; 
            let w = canvas.width * 3;
            let h = canvas.height * 3;
            let startX = canvas.width/2 - w/2;
            let startY = canvas.height/2 - h/2;

            let numParticles = 1200; 
            for(let i = 0; i < numParticles; i++) {
                let px = startX + Math.random() * w;
                let py = startY + Math.random() * h;
                let baseTemp = 0.4 + Math.random() * 0.4;
                let radius = (Math.random() * 180 + 120) * dpr; 
                let isPeripheral = Math.random() > 0.6;
                let isAdipose = Math.random() > 0.5;
                particles.push(new AbstractThermoNode(px, py, baseTemp, radius, isPeripheral, isAdipose));
            }
        }
        resize();

        function updateSystem() {
            let sys = {
                size: parseFloat(sliders.size.value) / 100, 
                blood: parseFloat(sliders.blood.value) / 100, 
                muscle: parseFloat(sliders.muscle.value) / 100,
                inflammation: parseFloat(sliders.inflammation.value) / 100,
                ambient: parseFloat(sliders.ambient.value) / 100, 
                humidity: parseFloat(sliders.humidity.value) / 100,
                sweat: parseFloat(sliders.sweat.value) / 100,
                age: parseFloat(sliders.age.value) / 100,
                fat: parseFloat(sliders.fat.value) / 100,
                disease: parseFloat(sliders.disease.value) / 100
            };

            document.getElementById('v-size').textContent = sliders.size.value + '%';
            document.getElementById('v-blood').textContent = sliders.blood.value + '%';
            document.getElementById('v-muscle').textContent = sliders.muscle.value + '%';
            document.getElementById('v-inflammation').textContent = sliders.inflammation.value + '%';
            document.getElementById('v-ambient').textContent = sliders.ambient.value + '%';
            document.getElementById('v-humidity').textContent = sliders.humidity.value + '%';
            document.getElementById('v-sweat').textContent = sliders.sweat.value + '%';
            document.getElementById('v-age').textContent = sliders.age.value + ' YRS';
            document.getElementById('v-fat').textContent = sliders.fat.value + '%';
            document.getElementById('v-disease').textContent = sliders.disease.value + '%';
            
            let evaporativeCooling = sys.sweat * (1 - sys.humidity); 
            let ambientEffect = (sys.ambient - 0.5); 
            let bloodHeating = (sys.blood - 0.5);
            sys.globalTempOffset = (bloodHeating * 0.4) - (evaporativeCooling * 0.5) + (ambientEffect * 0.4);

            return sys;
        }

        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];
        let recCanvas, recCtx, finalRecCanvas, finalRecCtx;
        let activeRecordButton = null;
        let recWidth, recHeight;

        function renderOfflineFrame(w, h, sys) {
            let offRaw = document.createElement('canvas');
            offRaw.width = w; offRaw.height = h;
            let rCtx = offRaw.getContext('2d');

            rCtx.fillStyle = '#000000';
            rCtx.fillRect(0, 0, w, h);

            rCtx.save();
            rCtx.translate(w/2, h/2);
            rCtx.scale(currentZoom, currentZoom);
            rCtx.translate(-canvas.width/2 + offsetX, -canvas.height/2 + offsetY);
            
            rCtx.globalCompositeOperation = 'source-over';
            particles.forEach(p => p.draw(sys, rCtx));
            rCtx.restore();

            let offFinal = document.createElement('canvas');
            offFinal.width = w; offFinal.height = h;
            let fCtx = offFinal.getContext('2d');
            
            fCtx.fillStyle = '#000000';
            fCtx.fillRect(0, 0, w, h);
            fCtx.filter = `blur(10px) contrast(1.3)`;
            fCtx.drawImage(offRaw, 0, 0);

            return offFinal;
        }

        window.exportMedia = function(w, h, type) {
            let sys = updateSystem();
            let finalCanvas = renderOfflineFrame(w, h, sys);
            let link = document.createElement('a');
            link.download = `Thermo_Export_${w}x${h}.png`;
            link.href = finalCanvas.toDataURL('image/png');
            link.click();
        }

        window.toggleRecord = function(w, h, btn) {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                btn.textContent = btn.dataset.originalText;
                btn.classList.remove('recording');
                document.querySelectorAll('[id^="btn-rec-"]').forEach(b => b.disabled = false);
            } else {
                recWidth = w;
                recHeight = h;
                activeRecordButton = btn;
                btn.dataset.originalText = btn.textContent;
                btn.textContent = "STOP";
                btn.classList.add('recording');
                document.querySelectorAll('[id^="btn-rec-"]').forEach(b => { if(b !== btn) b.disabled = true; });

                finalRecCanvas = document.createElement('canvas');
                finalRecCanvas.width = w; finalRecCanvas.height = h;
                finalRecCtx = finalRecCanvas.getContext('2d');

                let stream = finalRecCanvas.captureStream(60);
                
                let options = [
                    'video/mp4;codecs=h264',
                    'video/mp4;codecs=avc1',
                    'video/mp4',
                    'video/webm;codecs=h264',
                    'video/webm;codecs=vp9',
                    'video/webm'
                ];
                
                let mimeType = '';
                for (let type of options) {
                    if (MediaRecorder.isTypeSupported(type)) {
                        mimeType = type;
                        break;
                    }
                }
                
                if(!mimeType) mimeType = 'video/webm'; 
                let ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
                
                mediaRecorder = new MediaRecorder(stream, { 
                    mimeType: mimeType, 
                    videoBitsPerSecond: 50000000 
                });
                
                recordedChunks = [];

                mediaRecorder.ondataavailable = function(e) {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = function() {
                    let blob = new Blob(recordedChunks, { type: mimeType });
                    let url = URL.createObjectURL(blob);
                    let a = document.createElement('a');
                    document.body.appendChild(a);
                    a.style = 'display: none';
                    a.href = url;
                    a.download = `Thermo_Video_${w}x${h}.${ext}`;
                    a.click();
                    window.URL.revokeObjectURL(url);
                    
                    if(ext === 'webm') {
                        alert("Nota: Tu navegador grabó el video en formato WEBM. Para grabar un MP4 nativo directo para redes, por favor abre la webapp usando Safari.");
                    }
                };

                mediaRecorder.start();
                isRecording = true;
            }
        }

        function animate() {
            ctx.fillStyle = '#000000'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width/2 + offsetX, canvas.height/2 + offsetY);
            ctx.scale(currentZoom, currentZoom);
            ctx.translate(-canvas.width/2, -canvas.height/2);

            ctx.globalCompositeOperation = 'source-over';

            let sys = updateSystem();
            
            canvas.style.filter = `blur(14px) contrast(1.3)`;

            mouse.vx *= 0.85;
            mouse.vy *= 0.85;

            particles.forEach(p => {
                p.update(sys);
                p.draw(sys, ctx);
            });

            ctx.restore();

            if (isRecording && finalRecCanvas) {
                let frameCanvas = renderOfflineFrame(recWidth, recHeight, sys);
                finalRecCtx.drawImage(frameCanvas, 0, 0);
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
